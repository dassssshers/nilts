name: Build 🏗️

on:
  merge_group:
    types:
      - checks_requested

  pull_request:
    types:
      - opened
      - synchronize

  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
      - name: Analyze
        run: melos lint

  lint_workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Setup Bun
        uses: ./.github/actions/setup-bun
      - name: Setup zizmor
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: zizmor
      - name: Lint
        run: bun lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
      - name: Test
        run: melos test

  build_example_android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Setup Java
        uses: ./.github/actions/setup-java
      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
      - name: Build example Android
        run: melos build:example:android

  build_example_ios:
    runs-on: macos-26
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Select Xcode
        uses: ./.github/actions/select-xcode
      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
      - name: Build example iOS
        run: melos build:example:ios
